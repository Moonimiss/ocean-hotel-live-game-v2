
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ocean Battle Classroom Game</title>
<style>
body{font-family:Arial;background:#0c4a6e;color:white;text-align:center}
button{padding:10px;margin:5px;font-size:16px}
input{padding:5px}
</style>
</head>
<body>

<h1>Ocean Battle</h1>

<input id="name" placeholder="Your name">
<button onclick="join()">Join</button>

<h2>Your Gold: <span id="gold">0</span></h2>

<h3>Attack a Player</h3>
<input id="target" placeholder="Target player">
<button onclick="battle()">Start Battle</button>

<div id="battleBox"></div>

<h3>Leaderboard</h3>
<div id="board"></div>

<script>

let ws;
let myName="";

function join(){
 myName=document.getElementById("name").value;
 ws=new WebSocket(location.origin.replace("http","ws"));

 ws.onopen=()=>{
   ws.send(JSON.stringify({type:"join",name:myName}));
 }

 ws.onmessage=e=>{
  const data=JSON.parse(e.data);

  if(data.type==="state"){
    const p=data.players;

    document.getElementById("gold").innerText=p[myName]?.gold||0;

    let html="";
    for(const n in p){
       html+=n+" : "+p[n].gold+" gold<br>";
    }
    document.getElementById("board").innerHTML=html;

    if(data.currentBattle){
        document.getElementById("battleBox").innerHTML=`
        <h3>Battle Question</h3>
        <p>${data.currentBattle.question}</p>
        <input id="ans">
        <button onclick="sendAnswer()">Submit</button>
        `;
    }else{
        document.getElementById("battleBox").innerHTML="";
    }
  }
 }

}

function battle(){
 const target=document.getElementById("target").value;
 ws.send(JSON.stringify({type:"startBattle",attacker:myName,defender:target}));
}

function sendAnswer(){
 const ans=document.getElementById("ans").value;
 ws.send(JSON.stringify({type:"answer",name:myName,answer:ans}));
}

</script>

</body>
</html>
